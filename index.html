<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>The Bricks - Nikolaj Memič</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <h1>The Bricks</h1>

    <p>
        Točke: <span id="score">0</span> |
        Nivo: <span id="level">1</span> |
        Čas: <span id="time">0</span>s |
        Highscore: <span id="high">0</span>
    </p>

    <div class="controls">
        <button onclick="startGame()">Start</button>
        <button onclick="pauseGame()">Pause</button>
        <button onclick="toggleLevelMenu()">Nivoji</button>
        <button onclick="toggleAuthorMenu()">Avtor</button>
    </div>

    <div id="level-menu" class="modal-menu" style="display:none;">
        <div class="menu-content">
            <h2 style="color: #00d4ff;">Izberi Nivo</h2>
            <div id="levels-container"></div>
            <br>
            <button onclick="toggleLevelMenu()">Zapri</button>
        </div>
    </div>

    <div id="author-menu" class="modal-menu" style="display:none;">
        <div class="menu-content autor-card"> 
            <div class="author-info"> 
                <h3 style="color: #00d4ff; margin-bottom: 5px;">Avtor:</h3>
                <h2 style="color: #ffffff; margin-top: 0; letter-spacing: 1px;">Nikolaj Memič</h2>
                <p style="color: #cccccc;"><i>Naslov: The Bricks</i></p>
                <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;"> 
                <div class="social-links">
                    <span><a href="https://github.com/NikolajMemic/" target="_blank">GitHub Profil</a></span><br>
                    <span style="color: #888; display: inline-block; margin-top: 10px;">Leto: 2026</span>
                </div>
            </div>
            <br>
            <button onclick="toggleAuthorMenu()">Nazaj v igro</button>
        </div>
    </div>

    <canvas id="game" width="480" height="320"></canvas>

    <script src="js/storage.js"></script>
    <script src="js/paddle.js"></script>
    <script src="js/bricks.js"></script>
    <script src="js/ball.js"></script>
    <script src="js/collision.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
