<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>The Bricks - Time Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <h1>The Bricks</h1>

    <p>
        Točke: <span id="score">0</span> |
        Nivo: <span id="level">1</span> |
        Čas: <span id="time">0</span>s |
        Highscore: <span id="high">0</span>
    </p>

    <div class="controls">
        <button onclick="startGame()">Start</button>
        <button onclick="pauseGame()">Pause</button>
        <button onclick="toggleLevelMenu()">Nivoji</button>
    </div>

    <div id="level-menu" style="display:none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1c; padding: 20px; border: 2px solid #00d4ff; z-index: 100; min-width: 300px;">
        <h2 style="color: #ff00ff;">Izberi Nivo</h2>
        <div id="levels-container"></div>
        <br>
        <button onclick="toggleLevelMenu()">Zapri</button>
    </div>

    <canvas id="game" width="480" height="320"></canvas>

    <script src="js/storage.js"></script>
    <script src="js/paddle.js"></script>
    <script src="js/bricks.js"></script>
    <script src="js/ball.js"></script>
    <script src="js/collision.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
